<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>s20fe</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
        }
        h1 {
            font-size: 80px;
            color: #00ffcc;
            font-family: Arial, sans-serif;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Cuong is cuonging</h1>
    <p id="trigger">Click me</p>
<div id="egg" style="display:none;">🥚 You found the secret</div>

<script>
  const trigger = document.getElementById('trigger');
  const egg = document.getElementById('egg');

  trigger.addEventListener('click', (event) => {
    if (event.detail === 3) {
      egg.style.display = 'block';
    }
  });
</script>

</body>
</html>
